# API_CONTRACT.md

## Endpoints

---

### 1. Calculate Expression

| Property         | Value                        |
|------------------|-----------------------------|
| HTTP Method      | POST                        |
| Path             | `/api/calculate`            |
| Auth Required    | No                          |
| Request Body     | `application/json`          |
| Status Codes     | 200                         |

#### Request Body Schema (`CalculationCreate`)

| Field      | Type   | Required | Example   |
|------------|--------|----------|-----------|
| expression | string | Yes      | "2+2"     |

```json
{
  "expression": "2+2"
}
```

#### Response Schema (`Calculation`)

| Field       | Type    | Example                        |
|-------------|---------|--------------------------------|
| id          | number  | 1                              |
| expression  | string  | "2+2"                          |
| result      | number  | 4                              |
| created_at  | string  | "2024-06-01T12:00:00Z"         |

```json
{
  "id": 1,
  "expression": "2+2",
  "result": 4,
  "created_at": "2024-06-01T12:00:00Z"
}
```

---

### 2. Get Calculation History

| Property         | Value                        |
|------------------|-----------------------------|
| HTTP Method      | GET                         |
| Path             | `/api/history`              |
| Auth Required    | No                          |
| Request Body     | None                        |
| Status Codes     | 200                         |

#### Response Schema (`Calculation[]`)

Each item:

| Field       | Type    | Example                        |
|-------------|---------|--------------------------------|
| id          | number  | 1                              |
| expression  | string  | "2+2"                          |
| result      | number  | 4                              |
| created_at  | string  | "2024-06-01T12:00:00Z"         |

Example:

```json
[
  {
    "id": 1,
    "expression": "2+2",
    "result": 4,
    "created_at": "2024-06-01T12:00:00Z"
  },
  {
    "id": 2,
    "expression": "5-3",
    "result": 2,
    "created_at": "2024-06-01T12:01:00Z"
  }
]
```

